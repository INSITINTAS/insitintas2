<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Insi Tintas · Painel de Administração</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#C81E1E; --red-d:#9E1414; --navy:#1B2A4A; --navy-d:#142036;
  --bg:#F4F5F7; --card:#fff; --line:#E6E8EC; --txt:#1B2A4A; --mut:#7A8499;
  --ok:#1E9E5A; --warn:#E08A1E; --danger:#D63333;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;}

/* ===== LOGIN ===== */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy-d));padding:20px;z-index:100;}
.login-card{background:#fff;border-radius:20px;padding:40px 34px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.login-logo{font-family:'Bebas Neue';font-size:42px;letter-spacing:2px;color:var(--red);line-height:.9;}
.login-logo small{display:block;font-family:'Outfit';font-size:11px;letter-spacing:6px;color:var(--navy);font-weight:600;margin-top:2px;}
.login-card h1{font-size:16px;font-weight:600;color:var(--mut);margin:18px 0 22px;}
.login-card input{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;text-align:center;letter-spacing:3px;transition:border .15s;}
.login-card input:focus{outline:none;border-color:var(--red);}
.login-card button{width:100%;margin-top:14px;padding:13px;background:var(--red);color:#fff;border-radius:11px;font-weight:700;font-size:15px;transition:background .15s;}
.login-card button:hover{background:var(--red-d);}
.login-err{color:var(--danger);font-size:13px;margin-top:12px;display:none;font-weight:500;}
.login-hint{color:var(--mut);font-size:12px;margin-top:18px;}

/* ===== APP ===== */
.app{display:none;min-height:100vh;}
.app.on{display:block;}
.topbar{background:var(--navy);color:#fff;padding:0 22px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar .brand{font-family:'Bebas Neue';font-size:26px;letter-spacing:1.5px;display:flex;align-items:center;gap:10px;}
.topbar .brand span{color:#fff;}
.topbar .brand b{color:#fff;background:var(--red);padding:1px 8px;border-radius:6px;font-family:'Outfit';font-size:11px;font-weight:700;letter-spacing:1px;}
.topbar .actions{display:flex;gap:10px;align-items:center;}
.btn-logout{background:rgba(255,255,255,.12);color:#fff;padding:8px 16px;border-radius:9px;font-weight:600;font-size:13px;}
.btn-logout:hover{background:rgba(255,255,255,.22);}

.layout{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:230px;background:#fff;border-right:1px solid var(--line);padding:18px 14px;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:11px;color:var(--mut);font-weight:600;font-size:14px;margin-bottom:4px;transition:all .15s;width:100%;text-align:left;background:none;}
.nav-item:hover{background:var(--bg);color:var(--navy);}
.nav-item.on{background:var(--navy);color:#fff;}
.nav-item svg{flex-shrink:0;}
.main{flex:1;padding:26px;overflow-x:hidden;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{color:var(--mut);font-size:14px;margin-bottom:24px;}
.tab{display:none;}
.tab.on{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* cards/kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:26px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:15px;padding:20px;position:relative;overflow:hidden;}
.kpi .lbl{font-size:12px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.kpi .val{font-family:'Bebas Neue';font-size:38px;line-height:1;margin-top:8px;color:var(--navy);}
.kpi .ico{position:absolute;top:16px;right:16px;opacity:.16;}
.kpi.red .val{color:var(--red);} .kpi.red .ico{color:var(--red);}
.kpi.navy .val{color:var(--navy);} .kpi.navy .ico{color:var(--navy);}
.kpi.green .val{color:var(--ok);} .kpi.green .ico{color:var(--ok);}

.panel{background:#fff;border:1px solid var(--line);border-radius:15px;padding:22px;margin-bottom:20px;}
.panel h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px;}

/* toolbar */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.toolbar input[type=text],.toolbar select{padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;}
.toolbar input[type=text]{min-width:220px;}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--red);}
.btn{padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:all .15s;}
.btn-pri{background:var(--red);color:#fff;} .btn-pri:hover{background:var(--red-d);}
.btn-sec{background:var(--navy);color:#fff;} .btn-sec:hover{background:var(--navy-d);}
.btn-out{background:#fff;border:1.5px solid var(--line);color:var(--navy);} .btn-out:hover{border-color:var(--navy);}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}

/* table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:680px;}
th{background:var(--bg);text-align:left;padding:11px 14px;font-weight:700;color:var(--navy);font-size:12px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;}
td{padding:10px 14px;border-top:1px solid var(--line);vertical-align:middle;}
tr:hover td{background:#FAFBFC;}
.t-name{font-weight:600;color:var(--navy);}
.t-grp{font-size:11px;color:var(--mut);}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.pill.in{background:#E6F5EC;color:var(--ok);}
.pill.low{background:#FDF1E0;color:var(--warn);}
.pill.out{background:#FCE8E8;color:var(--danger);}
.edit-inp{width:90px;padding:6px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;}
.edit-inp:focus{outline:none;border-color:var(--red);}
.row-acts{display:flex;gap:6px;}
.ic-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);color:var(--navy);}
.ic-btn:hover{background:var(--navy);color:#fff;}
.ic-btn.del:hover{background:var(--danger);}

/* export banner */
.export-bar{position:sticky;bottom:0;background:#fff;border-top:1.5px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin:20px -26px -26px;flex-wrap:wrap;}
.export-bar .info{font-size:13px;color:var(--mut);}
.export-bar .info b{color:var(--red);}

/* modal */
.ov{position:fixed;inset:0;background:rgba(20,30,55,.6);display:none;align-items:center;justify-content:center;z-index:80;padding:18px;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;}
.modal-h{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;}
.modal-h h3{font-size:18px;font-weight:700;}
.modal-b{padding:24px;}
.fg{margin-bottom:15px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--red);}
.fg textarea{resize:vertical;min-height:70px;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-f{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
.x{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--mut);}
.x:hover{background:var(--danger);color:#fff;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:200;transition:transform .3s;display:flex;align-items:center;gap:9px;}
.toast.on{transform:translateX(-50%) translateY(0);}

/* empty */
.empty{text-align:center;padding:50px 20px;color:var(--mut);}
.empty svg{opacity:.4;margin-bottom:14px;}
.empty h4{font-size:16px;color:var(--navy);margin-bottom:6px;}

/* mobile */
@media(max-width:860px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;display:flex;gap:6px;overflow-x:auto;padding:12px;border-right:none;border-bottom:1px solid var(--line);}
  .nav-item{white-space:nowrap;margin-bottom:0;}
  .nav-item span{display:none;}
  .nav-item{padding:11px 13px;}
  .main{padding:18px;}
  .export-bar{margin:18px -18px -18px;padding:13px 18px;}
}
</style>
</head>

const FAQ_DATA = [{"cat": "Entrega", "q": "Fazem entrega em todo Angola?", "a": "Sim! Entregamos em todas as províncias de Angola. Temos filiais próprias em Luanda, Namibe, Lubango e Huambo, e parceiros de entrega para as restantes províncias."}, {"cat": "Entrega", "q": "Quanto tempo demora a entrega?", "a": "Luanda: 24 a 48 horas úteis. Namibe, Lubango, Huambo: 2 a 4 dias úteis. Outras províncias: 5 a 10 dias úteis. Todos os prazos são contados após confirmação de pagamento."}, {"cat": "Entrega", "q": "Qual é o custo de entrega?", "a": "A entrega é gratuita em todo Angola, independentemente do valor da encomenda."}, {"cat": "Entrega", "q": "Posso levantar na loja?", "a": "Sim! Pode levantar nas nossas 4 filiais: Namibe (Rua Juiz Ornelas), Luanda (Via Express, SOMAG), Lubango (Maçon Executivo), Huambo (Zona Industrial). O levantamento fica pronto em 2 a 4 horas."}, {"cat": "Pagamento", "q": "Que métodos de pagamento aceitam?", "a": "Aceitamos Multicaixa Express, Transferência Bancária (BFA) e Contra-Entrega (apenas para encomendas até 150.000 Kz entregues nas nossas filiais)."}, {"cat": "Pagamento", "q": "Emitem factura com NIF?", "a": "Sim! Para clientes empresa, basta indicar o NIF durante o checkout. A factura é enviada por email ou WhatsApp."}, {"cat": "Pagamento", "q": "Têm preços especiais para empreiteiros?", "a": "Sim! Para encomendas acima de 200.000 Kz temos preços preferenciais. Contacte-nos pelo WhatsApp ou use o formulário de Orçamento PRO."}, {"cat": "Produtos", "q": "As tintas são fabricadas em Angola?", "a": "Sim, 100%! Todos os produtos Insi Tintas são fabricados na nossa unidade de produção no Namibe, com controlo de qualidade rigoroso. Somos certificados pelo DPRT."}, {"cat": "Produtos", "q": "Qual a diferença entre tinta PVA e tinta Plástica?", "a": "A tinta PVA é mais económica, com boa cobertura e secagem rápida — ideal para interiores de baixo desgaste. A tinta Plástica tem maior resistência à lavagem e humidade — ideal para cozinhas, casas de banho e exteriores."}, {"cat": "Produtos", "q": "Como posso misturar cores?", "a": "A mistura de cores personalizadas está disponível nas nossas lojas físicas. Online, oferecemos a nossa paleta de mais de 500 cores standard. Para cores especiais, contacte-nos antes de encomendar."}, {"cat": "Produtos", "q": "Qual o prazo de validade das tintas?", "a": "As tintas Insi têm prazo de validade mínimo de 24 meses a partir da data de fabrico, quando armazenadas correctamente à sombra, entre 10 e 35 graus, com embalagem fechada."}, {"cat": "Produtos", "q": "Quanto tinta preciso para a minha obra?", "a": "Use a nossa Calculadora de Tinta no site principal! Basta inserir as dimensões da parede, tipo de superfície e número de demãos para saber exactamente quantas embalagens precisa."}, {"cat": "Aplicação", "q": "Preciso de aplicar primário antes da tinta?", "a": "Regra geral: sim, especialmente em superfícies novas, porosas ou de cor muito diferente. O primário Insi sela a superfície e melhora a aderência. Em paredes já pintadas e em bom estado pode dispensar."}, {"cat": "Aplicação", "q": "Com que se dilui a tinta PVA?", "a": "A tinta PVA e todas as tintas de base aquosa Insi diluem-se com água limpa, no máximo 10 a 15%. Para base sintética use aguarrás mineral."}, {"cat": "Aplicação", "q": "Quantas demãos são necessárias?", "a": "Para a maioria dos produtos Insi recomendamos 2 demãos. A Borracha Líquida requer 2 a 3 demãos. Aguarde sempre a secagem completa antes de aplicar a demão seguinte."}, {"cat": "Devoluções", "q": "Posso devolver um produto?", "a": "Aceitamos devoluções de produtos não abertos e em perfeito estado no prazo de 7 dias após a recepção. Para embalagens abertas ou tinta já misturada não é possível devolução."}, {"cat": "Devoluções", "q": "O que acontece se o produto tiver defeito?", "a": "Em caso de defeito de fabrico comprovado, substituímos o produto imediatamente e sem custos adicionais. Tire uma fotografia e envie-nos via WhatsApp."}, {"cat": "Distribuidores", "q": "Como posso ser distribuidor Insi?", "a": "Preencha o formulário na nossa página de distribuidores ou contacte-nos directamente. Analisamos todas as candidaturas em 48 horas."}];
const BLOG_DATA = [{"id": 1, "cat": "Aplicação", "em": "<svg class='insi-ic' width='1em' height='1em' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true' focusable='false'><path d='M16 3l-7 7'/><path d='M9 10l5 5'/><path d='M14 15l-7 6-3-3 6-7z'/></svg>", "title": "Como preparar uma parede antes de pintar", "exc": "Uma boa preparação é 50% do trabalho. Descubra como limpar, lixar, reparar e primurizar correctamente para obter o melhor resultado com qualquer tinta.", "date": "12 Mar 2025", "rt": "5 min", "corpo": "<p>A preparação da superfície é o passo mais importante de qualquer trabalho de pintura. Mesmo a melhor tinta do mundo não consegue esconder uma preparação deficiente.</p><h4>Materiais necessários</h4><ul><li>Espátula ou raspador</li><li>Lixa de parede (grão 80 e 120)</li><li>Primário Insi Tintas</li><li>Trincha e rolo</li></ul><h4>Passo a passo</h4><ol><li><strong>Limpeza:</strong> Remova pó, gordura e manchas. Deixe secar.</li><li><strong>Raspar:</strong> Remova tinta velha descascada.</li><li><strong>Lixar:</strong> Lixe zonas irregulares. Limpe com pano húmido.</li><li><strong>Reparar:</strong> Aplique massa nas fissuras. Aguarde e lixe.</li><li><strong>Primário:</strong> Aplique Primário Insi diluído 20%. Aguarde 1 hora.</li></ol>", "img": "media/blog-aplicar-marmorito.webp"}, {"id": 2, "cat": "Decoração", "em": "<svg class='insi-ic' width='1em' height='1em' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true' focusable='false'><path d='M4 11l8-7 8 7'/><path d='M6 10v9h12v-9'/><path d='M10 19v-5h4v5'/></svg>", "title": "Que cor escolher para cada divisão da casa?", "exc": "A psicologia das cores aplicada à decoração. Cores quentes, frias, neutras — saiba qual é ideal para cada espaço.", "date": "28 Fev 2025", "rt": "7 min", "corpo": "<p>A escolha da cor certa influencia o humor, a p ilizar um terraço com Borracha Líquida", "exc": "Guia passo a passo para acabar definitivamente com infiltrações usando a Borracha Líquida Insi.", "date": "3 Fev 2025", "rt": "8 min", "corpo": "<p>A Borracha Líquida Insi é a solução mais eficaz para infiltrações em terraços.</p><h4>Processo</h4><ol><li>Limpe o terraço e aguarde secagem total (48h sem chuva)</li><li>Repare fissuras com mástique. Aguarde 24h.</li><li>Aplique 1ª demão uniformemente (1,5 kg/m²)</li><li>Aguarde 4 horas antes da 2ª demão</li><li>Aplique 2ª demão no sentido cruzado</li><li>Para máxima protecção, aplique 3ª demão</li><li>Não exponha a água por 48h após a última demão</li></ol>", "img": "media/blog-impermeabilizar.webp"}, {"id": 5, "cat": "Obras & Negócio", "em": "<svg class='insi-ic' width='1em' height='1em' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true' focusable='false'><path d='M4 4v16h16'/><path d='M8 16v-4M12 16v-7M16 16v-2'/></svg>", "title": "Dicas para empreiteiros: como reduzir custos em tinta", "exc": "Estratégias práticas para calcular correctamente, evitar desperdícios e aumentar a margem de lucro.", "date": "20 Jan 2025", "rt": "5 min", "corpo": "<p>A tinta é um dos custos mais significativos numa obra. Pequenas melhorias podem representar grandes poupanças.</p><h4>1. Calcule correctamente</h4><p>Use a nossa calculadora online. Inclua sempre 10% de margem para retoques.</p><h4>2. Prepare bem as superfícies</h4><p>Uma superfície bem preparada precisa de menos tinta de acabamento.</p><h4>3. Compre por grosso</h4><p>Para obras acima de 500m², contacte-nos para preços especiais.</p><h4>4. Armazene correctamente</h4><p>Tinta mal armazenada degrada-se. Armazene à sombra, entre 10 e 30 graus.</p>", "img": "media/blog-sinalizacao.webp"}, {"id": 6, "cat": "Angola", "em": "<svg class='insi-ic insi-flag' width='1.25em' height='1em' viewBox='0 0 36 24' aria-hidden='true' focusable='false'><rect width='36' height='12' y='0' fill='#cc092f'/><rect width='36' height='12' y='12' fill='#000'/><g fill='#f9d616' transform='translate(18 12)'><path d='M-4 -5 A5 5 0 1 0 -4 5 4 4 0 1 1 -4 -5z'/><path d='M0 -5.5l.9 2.7h2.8l-2.3 1.7.9 2.7L0 -.2l-2.3 1.6.9-2.7-2.3-1.7h2.8z'/><rect x='-1' y='-1' width='6' height='1.4' transform='rotate(45)'/></g></svg>", "title": "Orgulho Nacional: a história da Insi Tintas", "exc": "Desde 2009 a produzir tintas de qualidade em Angola. Conheça a nossa história e missão.", "date": "10 Jan 2025", "rt": "4 min", "corpo": "<p>A Insi Tintas nasceu em 2009 no Namibe com um propósito: provar que Angola pode produzir tintas de qualidade igual ou superior às importadas.</p><p>Hoje, com mais de 15 anos de experiência e 12.000 clientes, acreditamos ter cumprido esse propósito.</p><p><strong>Angola merece o melhor. E o melhor pode ser feito aqui.</strong></p>"}];

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ═══════════ INSI ADMIN ═══════════ */

/* ───────── SUPABASE (sincronização com o servidor) ───────── */
const SB_URL = "https://ozgfxearzljisjafjpji.supabase.co";
const SB_KEY = "sb_publishable_gglnLbgyyPf2sKoyL1p7bQ_Bx8hz7aM";
const ADMIN_EMAIL = "COLOQUE_O_SEU_EMAIL_AQUI"; /* email do utilizador criado no Supabase */
const sb = supabase.createClient(SB_URL, SB_KEY);

/* stock: o site usa 'in'/'low'/'out'; o servidor guarda um número */
function stockToNum(s){ return s==='out'?0 : s==='low'?5 : 50; }
function numToStock(n){ n=Number(n)||0; return n<=0?'out' : n<=5?'low' : 'in'; }

/* servidor -> formato do painel */
function rowToProduct(r){
  return {
    id: (r.site_id!=null ? r.site_id : r.id), _dbid: r.id,
    name: r.nome, grupo: r.grupo, cat: r.categoria, desc: r.descricao,
    price: r.preco||0, stock: numToStock(r.stock),
    sizes: r.tamanhos||[], priceBySize: r.precos||{},
    img: r.imagem||'', ficha: r.ficha_tecnica||'',
    brand:'Insi Tintas', colors:[], ph:1
  };
}
/* painel -> servidor */
function productToRow(p){
  return {
    site_id: p.id, nome: p.name, grupo: p.grupo||null, categoria: p.cat||null,
    descricao: p.desc||null, preco: p.price||0,
    unidade: (p.sizes&&p.sizes[0])||null, stock: stockToNum(p.stock),
    tamanhos: (p.sizes&&p.sizes.length)?p.sizes:null,
    precos: (p.priceBySize&&Object.keys(p.priceBySize).length)?p.priceBySize:null,
    ficha_tecnica: p.ficha||null, imagem: p.img||null, ativo:true
  };
}
/* puxar todos os produtos do servidor */
async function sbLoadProducts(){
  const { data, error } = await sb.from('produtos').select('*').order('site_id');
  if(error){ console.error('Supabase load:', error); return null; }
  return data.map(rowToProduct);
}
/* gravar (criar/atualizar) um produto no servidor, por site_id */
async function sbSaveProduct(p){
  const { error } = await sb.from('produtos').upsert(productToRow(p), { onConflict:'site_id' });
  if(error){ console.error('Supabase save:', error); return false; }
  return true;
}
/* apagar no servidor */
async function sbDeleteProduct(id){
  const { error } = await sb.from('produtos').delete().eq('site_id', id);
  if(error){ console.error('Supabase delete:', error); return false; }
  return true;
}

var PWD_HASH = null; // definido abaixo
// palavra-passe: "insi2026" (podes mudar — ver instruções)
var ADMIN_PWD = 'insi2026';

var state = {
  products: JSON.parse(JSON.stringify(PRODUCTS)),
  faq: JSON.parse(JSON.stringify(FAQ_DATA)),
  blog: JSON.parse(JSON.stringify(BLOG_DATA)),
  sobre: JSON.parse(JSON.stringify(SOBRE_DATA)),
  orders: [],
  site: {
    namibe:'926 199 669', luanda:'952 423 990', lubango:'947 906 514', huambo:'932 009 853',
    email:'geral@insitintas.com',
    heroTitle:'Tintas profissionais fabricadas em Angola',
    heroSub:'Qualidade que protege e valoriza os seus espaços.'
  },
  tab:'dash', dirty:false
};

/* ── LOGIN ── */
async function doLogin(){
  var v=document.getElementById('pwd').value;
  var err=document.getElementById('loginErr');
  const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: v });
  if(error){
    err.style.display='block';
    document.getElementById('pwd').value=''; document.getElementById('pwd').focus();
    return;
  }
  enterApp();
}
async function enterApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').classList.add('on');
  await loadData(); renderNav(); go('dash');
}
async function doLogout(){
  try{ await sb.auth.signOut(); }catch(e){}
  location.reload();
}
(async function(){ try{
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ enterApp(); }
}catch(e){} })();

/* ── DADOS (localStorage) ── */
async function loadData(){
  // Produtos: vêm do servidor (fonte da verdade). Se falhar, usa cópia local.
  try{
    var prods = await sbLoadProducts();
    if(prods){ state.products = prods; try{localStorage.setItem('insiAdminProducts',JSON.stringify(prods));}catch(e){} }
    else { var pc=localStorage.getItem('insiAdminProducts'); if(pc) state.products=JSON.parse(pc); }
  }catch(e){ var pc=localStorage.getItem('insiAdminProducts'); if(pc) state.products=JSON.parse(pc); }
  // Restantes secções continuam locais por agora
  try{
    var o=localStorage.getItem('insiOrders'); if(o) state.orders=JSON.parse(o);
    var s=localStorage.getItem('insiSite'); if(s) state.site=Object.assign(state.site,JSON.parse(s));
    var fq=localStorage.getItem('insiFaq'); if(fq) state.faq=JSON.parse(fq);
    var bl=localStorage.getItem('insiBlog'); if(bl) state.blog=JSON.parse(bl);
    var sb2=localStorage.getItem('insiSobre'); if(sb2) state.sobre=Object.assign(state.sobre,JSON.parse(sb2));
  }catch(e){}
}
function saveProducts(){ try{localStorage.setItem('insiAdminProducts',JSON.stringify(state.products));}catch(e){} }
function saveSite(){ try{localStorage.setItem('insiSite',JSON.stringify(state.site));}catch(e){} }

/* ── NAV ── */
var NAV=[
  {id:'dash',label:'Dashboard',ico:'<path d="M4 13h7V4H4zM13 20h7v-9h-7zM13 4v5h7V4zM4 20h7v-5H4z"/>'},
  {id:'prods',label:'Produtos',ico:'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 21V11"/>'},
  {id:'orders',label:'Pedidos',ico:'<rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/>'},
  {id:'dicas',label:'Dicas',ico:'<path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/>'},
  {id:'faq',label:'FAQ',ico:'<circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01"/>'},
  {id:'sobre',label:'Sobre Nós',ico:'<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>'},
  {id:'site',label:'Contactos & Textos',ico:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'}
];
function navIco(d){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+d+'</svg>';}
function renderNav(){
  document.getElementById('sidebar').innerHTML=NAV.map(function(n){
    return '<button class="nav-item'+(state.tab===n.id?' on':'')+'" onclick="go(\''+n.id+'\')">'+navIco(n.ico)+'<span>'+n.label+'</span></button>';
  }).join('');
}
function go(tab){ state.tab=tab; renderNav();
  if(tab==='dash')renderDash();
  else if(tab==='prods')renderProds();
  else if(tab==='orders')renderOrders();
  else if(tab==='dicas')renderDicas();
  else if(tab==='faq')renderFaq();
  else if(tab==='sobre')renderSobre();
  else if(tab==='site')renderSite();
}

/* ── helpers ── */
function fmt(n){return (n||0).toLocaleString('pt-PT')+' Kz';}
function toast(msg){var t=document.getElementById('toast');t.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12l4 4L19 6"/></svg> '+msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2600);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function closeOv(){document.getElementById('ov').classList.remove('on');document.getElementById('ov').innerHTML='';}

/* ═══ DASHBOARD ═══ */
function renderDash(){
  var P=state.products, O=state.orders;
  var totalVal=P.reduce(function(s,p){return s+(p.price||0);},0);
  var low=P.filter(function(p){return p.stock==='low';}).length;
  var out=P.filter(function(p){return p.stock==='out';}).length;
  var grupos=[...new Set(P.map(function(p){return p.grupo;}))].length;
  var revenue=O.reduce(function(s,o){return s+(o.total||0);},0);
  // mais "vendidos" = mais pedidos
  var cnt={}; O.forEach(function(o){(o.items||[]).forEach(function(i){cnt[i.name]=(cnt[i.name]||0)+(i.qty||1);});});
  var top=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var html=''
  +'<div class="page-title">Dashboard</div><div class="page-sub">Visão geral da loja Insi Tintas</div>'
  +'<div class="kpi-grid">'
    +kpi('navy','Produtos',P.length,'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/>')
    +kpi('red','Categorias',grupos,'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>')
    +kpi('green','Pedidos',O.length,'<rect x="5" y="4" width="14" height="17" rx="2"/>')
    +kpi('navy','Receita Pedidos',O.length?fmt(revenue):'—','<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>')
  +'</div>';
  // alertas de stock
  html+='<div class="panel"><h3>'+navIco('<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>')+' Stock</h3>';
  if(low+out===0){ html+='<p style="color:var(--mut);font-size:14px">Todos os produtos com stock disponível.</p>'; }
  else {
    html+='<p style="font-size:14px;margin-bottom:10px"><b style="color:var(--warn)">'+low+'</b> com stock baixo · <b style="color:var(--danger)">'+out+'</b> esgotados.</p>';
    var alerts=P.filter(function(p){return p.stock==='low'||p.stock==='out';}).slice(0,8);
    html+='<div class="tbl-wrap"><table><thead><tr><th>Produto</th><th>Estado</th></tr></thead><tbody>'
      +alerts.map(function(p){return '<tr><td class="t-name">'+esc(p.name)+'</td><td>'+stockPill(p.stock)+'</td></tr>';}).join('')
      +'</tbody></table></div>';
  }
  html+='</div>';
  // top produtos
  html+='<div class="panel"><h3>'+navIco('<path d="M3 3v18h18"/><path d="M7 14l3-3 4 4 5-6"/>')+' Produtos Mais Pedidos</h3>';
  if(top.length===0){ html+='<p style="color:var(--mut);font-size:14px">Ainda não há pedidos registados neste dispositivo.</p>'; }
  else {
    html+='<div class="tbl-wrap"><table><thead><tr><th>Produto</th><th>Qtd. Pedida</th></tr></thead><tbody>'
      +top.map(function(t){return '<tr><td class="t-name">'+esc(t[0])+'</td><td><b>'+t[1]+'</b></td></tr>';}).join('')
      +'</tbody></table></div>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}
function kpi(cls,lbl,val,ico){return '<div class="kpi '+cls+'"><div class="ico">'+navIco(ico)+'</div><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>';}
function stockPill(s){return s==='out'?'<span class="pill out">Esgotado</span>':s==='low'?'<span class="pill low">Stock baixo</span>':'<span class="pill in">Disponível</span>';}

/* ═══ PRODUTOS ═══ */
var prodFilter={q:'',grp:'all'};
function renderProds(){

  +'<div class="page-title">Produtos</div><div class="page-sub">'+state.products.length+' produtos · edite preços, stock ou adicione novos</div>'
  +'<div class="toolbar">'

    +'<select id="pgrp" onchange="prodFilter.grp=this.value;drawProdTable()"><option value="all">Todas as categorias</option>'

    +'</select>'
    +'<button class="btn btn-pri" onclick="openProdModal()">'+navIco('<path d="M12 5v14M5 12h14"/>')+' Novo Produto</button>'
  +'</div>'
  +'<div id="prodTableWrap"></div>'
  +'<div class="export-bar"><div class="info">As alterações são <b>gravadas automaticamente no servidor</b> e refletem-se no site. O botão abaixo continua disponível como cópia de segurança.</div>'
    +'<button class="btn btn-sec" onclick="exportProducts()">'+navIco('<path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/>')+' Exportar para o Site</button></div>';
  document.getElementById('main').innerHTML=html;
  drawProdTable();
}
function drawProdTable(){
  var q=prodFilter.q.toLowerCase(), grp=prodFilter.grp;
  var list=state.products.filter(function(p){
    if(grp!=='all'&&p.grupo!==grp)return false;
    if(q&&!(p.name||'').toLowerCase().includes(q))return false;

function opt(v,l,cur){return '<option value="'+v+'"'+(cur===v?' selected':'')+'>'+l+'</option>';}
function quickPrice(id,v){var p=state.products.find(function(x){return x.id===id;});if(p){p.price=parseInt(v)||0;saveProducts();state.dirty=true;sbSaveProduct(p).then(function(ok){toast(ok?'Preço gravado no servidor':'Erro no servidor — guardado localmente');});}}
function quickStock(id,v){var p=state.products.find(function(x){return x.id===id;});if(p){p.stock=v;saveProducts();state.dirty=true;sbSaveProduct(p).then(function(ok){toast(ok?'Stock gravado no servidor':'Erro no servidor — guardado localmente');});}}
function delProd(id){
  var p=state.products.find(function(x){return x.id===id;}); if(!p)return;
  if(!confirm('Remover "'+p.name+'"? Apaga no painel e no servidor.'))return;
  state.products=state.products.filter(function(x){return x.id!==id;});
  saveProducts();drawProdTable();
  sbDeleteProduct(id).then(function(ok){toast(ok?'Produto removido':'Removido localmente — erro no servidor');});
}
function openProdModal(id){
  var p=id?state.products.find(function(x){return x.id===id;}):{id:null,name:'',grupo:'',cat:'',price:0,desc:'',stock:'in',sizes:[],brand:'Insi Tintas',ph:1};
  var grupos=[...new Set(state.products.map(function(x){return x.grupo;}))].sort();
  var ov=document.getElementById('ov');
  ov.innerHTML='<div class="modal"><div class="modal-h"><h3>'+(id?'Editar Produto':'Novo Produto')+'</h3><button class="x" onclick="closeOv()">✕</button></div>'
    +'<div class="modal-b">'
      +fld('Nome','m_name',esc(p.name),'text')
      +'<div class="fg-row">'+fldSelGrp('m_grupo',p.grupo,grupos)+fld('Categoria','m_cat',esc(p.cat||''),'text')+'</div>'
      +'<div class="fg-row">'+fld('Preço (Kz)','m_price',p.price||0,'number')+fldSel('Stock','m_stock',p.stock||'in',[['in','Disponível'],['low','Stock baixo'],['out','Esgotado']])+'</div>'
      +fld('Tamanhos (separados por vírgula)','m_sizes',esc((p.sizes||[]).join(', ')),'text')
      +fldArea('Descrição','m_desc',esc(p.desc||''))
    +'</div>'
    +'<div class="modal-f"><button class="btn btn-out" onclick="closeOv()">Cancelar</button><button class="btn btn-pri" onclick="saveProdModal('+(id||'null')+')">Guardar</button></div>'
  +'</div>';
  ov.classList.add('on');
}
function fld(l,id,v,t){return '<div class="fg"><label>'+l+'</label><input type="'+t+'" id="'+id+'" value="'+v+'"/></div>';}
function fldArea(l,id,v){return '<div class="fg"><label>'+l+'</label><textarea id="'+id+'">'+v+'</textarea></div>';}
function fldSel(l,id,cur,opts){return '<div class="fg"><label>'+l+'</label><select id="'+id+'">'+opts.map(function(o){return '<option value="'+o[0]+'"'+(cur===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select></div>';}
function fldSelGrp(id,cur,grupos){return '<div class="fg"><label>Categoria (secção)</label><select id="'+id+'">'+grupos.map(function(g){return '<option'+(cur===g?' selected':'')+'>'+esc(g)+'</option>';}).join('')+'</select></div>';}
function saveProdModal(id){
  var name=document.getElementById('m_name').value.trim();
  if(!name){alert('Indique o nome do produto.');return;}
  var data={
    name:name, grupo:document.getElementById('m_grupo').value, cat:document.getElementById('m_cat').value.trim(),
    price:parseInt(document.getElementById('m_price').value)||0, stock:document.getElementById('m_stock').value,
    sizes:document.getElementById('m_sizes').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
    desc:document.getElementById('m_desc').value.trim()
  };
  var saved;
  if(id){ var p=state.products.find(function(x){return x.id===id;}); Object.assign(p,data); saved=p; }
  else { var maxId=state.products.reduce(function(m,p){return Math.max(m,p.id);},0); saved=Object.assign({id:maxId+1,brand:'Insi Tintas',ph:1,novo:1,colors:[],priceBySize:{}},data); state.products.push(saved); }
  saveProducts();closeOv();drawProdTable();
  sbSaveProduct(saved).then(function(ok){toast(ok?(id?'Produto atualizado no servidor':'Produto adicionado no servidor'):'Guardado localmente — erro no servidor');});
}

    dl(new Blob(['const ARTIGOS = '+JSON.stringify(state.blog)+';'],{type:'text/plain'}),'ARTIGOS_atualizado.txt');
    alert('Ficheiro "ARTIGOS_atualizado.txt" descarregado.\n\nNo insi-blog.html, substitua a linha "const ARTIGOS = [...]" pelo conteúdo do ficheiro.');
  } else if(which==='sobre'){
    saveSobreForm();
    dl(new Blob(['/* Cole no insi-sobre.html, antes de </body> (substitui o bloco insiSobre se já existir) */\n<script>\n(function(){var ov='+JSON.stringify(state.sobre)+';try{localStorage.setItem("insiSobre",JSON.stringify(ov));}catch(e){}Object.keys(ov).forEach(function(id){var el=document.querySelector(\'[data-edit="\'+id+\'"]\');if(el&&ov[id])el.textContent=ov[id];});})();\n<\/script>'],{type:'text/plain'}),'SOBRE_atualizado.txt');
    alert('Ficheiro "SOBRE_atualizado.txt" descarregado.\n\nOs textos do Sobre Nós aplicam-se automaticamente neste dispositivo.\nPara publicá-los para todos, abra o ficheiro e siga a instrução lá dentro.');
  }
  toast('Exportado');
}

/* ── download helper ── */
function dl(blob,fname){
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeOv();});
</script>
